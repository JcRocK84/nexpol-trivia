<html lang="es">
<head>
<meta charset="UTF-8">

<title>NEXPOL · Trivia de Autores</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap');

:root{
  --primary:#1B3A6B;
  --primary-light:#2E6F9E;
  --primary-dark:#122745;
  --gold:#C9A227;
  --gold-light:#E4C763;
  --bg:#F2F5F9;
  --card:#FFFFFF;
  --ink:#16202B;
  --ink-soft:#556074;
  --border:#DCE3EC;
  --success:#2F8F5B;
  --danger:#C1443C;
  --radius:14px;
}
*{box-sizing:border-box;}
body{
  margin:0;
  background:var(--bg);
  color:var(--ink);
  font-family:'Inter',sans-serif;
  min-height:100vh;
}
#app{max-width:980px;margin:0 auto;padding:18px 16px 50px;}
@media(min-width:860px){
  body{background:radial-gradient(circle at 50% 0%, #F8FAFC 0%, var(--bg) 60%);}
  #app{max-width:1040px;padding:34px 30px 60px;}
  .card{padding:28px 30px;}
  .qtext{font-size:22px;}
  .match-grid{grid-template-columns:repeat(6,1fr);}
}
@media(max-width:380px){
  .brandbar h1{font-size:17px;}
  .qtext{font-size:17px;}
  .btn{font-size:14px;padding:12px 16px;}
  .mode-card .icon{font-size:22px;}
}

.brandbar{
  display:flex;align-items:center;gap:10px;
  margin-bottom:18px;
}
.brandbar .badge-icon{
  width:34px;height:34px;background:var(--primary);
  clip-path:polygon(50% 0%,100% 20%,100% 65%,50% 100%,0% 65%,0% 20%);
  display:flex;align-items:center;justify-content:center;
  color:var(--gold-light);font-family:'Baloo 2';font-weight:800;font-size:15px;
  flex-shrink:0;
}
.brandbar h1{
  font-family:'Baloo 2';font-weight:800;font-size:20px;color:var(--primary-dark);
  margin:0;letter-spacing:.2px;
}
.brandbar span.tag{
  font-family:'JetBrains Mono';font-size:11px;color:var(--ink-soft);
  background:var(--card);border:1px solid var(--border);padding:2px 8px;border-radius:20px;
}

.card{
  background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
  padding:22px;margin-bottom:16px;box-shadow:0 2px 10px rgba(20,40,70,.05);
}
h2.section-title{
  font-family:'Baloo 2';font-weight:700;font-size:18px;color:var(--primary-dark);
  margin:0 0 14px;
}
p.lead{color:var(--ink-soft);font-size:14.5px;line-height:1.5;margin:0 0 16px;}

input[type=text]{
  width:100%;padding:12px 14px;border-radius:10px;border:1.5px solid var(--border);
  font-family:'Inter';font-size:15px;outline:none;transition:border .15s;
}
input[type=text]:focus{border-color:var(--primary-light);}

.btn{
  font-family:'Baloo 2';font-weight:700;font-size:15px;
  border:none;border-radius:10px;padding:13px 20px;cursor:pointer;
  transition:transform .1s, box-shadow .15s;
}
.btn:active{transform:scale(.97);}
.btn-primary{background:var(--primary);color:#fff;}
.btn-primary:hover{background:var(--primary-dark);}
.btn-gold{background:var(--gold);color:var(--primary-dark);}
.btn-gold:hover{background:var(--gold-light);}
.btn-ghost{background:transparent;color:var(--primary);border:1.5px solid var(--primary-light);}
.btn-ghost:hover{background:#EAF1F8;}
.btn-block{width:100%;}
.btn-row{display:flex;gap:10px;flex-wrap:wrap;}

.chip{
  display:inline-flex;align-items:center;gap:6px;
  padding:8px 13px;border-radius:20px;border:1.5px solid var(--border);
  font-size:13.5px;font-weight:600;cursor:pointer;background:#fff;color:var(--ink-soft);
  transition:all .12s;
}
.chip.active{background:var(--primary);border-color:var(--primary);color:#fff;}
.chip-grid{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:18px;}

.mode-grid{display:grid;grid-template-columns:1fr;gap:12px;margin-bottom:6px;}
@media(min-width:520px){.mode-grid{grid-template-columns:1fr 1fr 1fr;}}
.mode-card{
  border:2px solid var(--border);border-radius:12px;padding:16px 14px;cursor:pointer;
  text-align:center;transition:all .15s;background:#fff;
}
.mode-card:hover{border-color:var(--primary-light);}
.mode-card.active{border-color:var(--primary);background:#EAF1F8;}
.mode-card .icon{font-size:26px;margin-bottom:6px;}
.mode-card .name{font-family:'Baloo 2';font-weight:700;font-size:14.5px;color:var(--primary-dark);}
.mode-card .desc{font-size:12px;color:var(--ink-soft);margin-top:3px;line-height:1.35;}

/* Shield / rank signature */
.shield{
  width:56px;height:64px;background:linear-gradient(160deg,var(--primary-light),var(--primary));
  clip-path:polygon(50% 0%,100% 18%,100% 62%,50% 100%,0% 62%,0% 18%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  border:2px solid var(--gold);flex-shrink:0;
}
.shield .stripes{display:flex;gap:2px;margin-top:4px;}
.shield .stripe{width:6px;height:3px;background:var(--gold-light);border-radius:1px;}
.rank-block{display:flex;align-items:center;gap:12px;margin-bottom:16px;}
.rank-info .rank-name{font-family:'Baloo 2';font-weight:700;font-size:16px;color:var(--primary-dark);}
.rank-info .rank-score{font-family:'JetBrains Mono';font-size:13px;color:var(--ink-soft);}

.progress-bar-outer{height:8px;background:var(--border);border-radius:6px;overflow:hidden;margin:6px 0 2px;}
.progress-bar-inner{height:100%;background:var(--gold);border-radius:6px;transition:width .25s;}

/* quiz */
.timerbar-outer{height:6px;background:var(--border);border-radius:6px;overflow:hidden;margin-bottom:14px;}
.timerbar-inner{height:100%;background:var(--primary-light);transition:width .1s linear;}
.qmeta{display:flex;justify-content:space-between;font-family:'JetBrains Mono';font-size:12.5px;color:var(--ink-soft);margin-bottom:10px;}
.qtext{font-family:'Baloo 2';font-weight:700;font-size:19px;color:var(--primary-dark);line-height:1.35;margin-bottom:18px;}
.qtext b{color:var(--primary);}
.options{display:flex;flex-direction:column;gap:10px;}
.opt{
  text-align:left;padding:13px 16px;border-radius:10px;border:1.5px solid var(--border);
  background:#fff;font-family:'Inter';font-size:14.5px;font-weight:500;cursor:pointer;
  transition:all .12s;
}
.opt:hover{border-color:var(--primary-light);}
.opt.correct{background:#EAF7EF;border-color:var(--success);color:var(--success);font-weight:700;}
.opt.wrong{background:#FBEAE8;border-color:var(--danger);color:var(--danger);font-weight:700;}
.opt.disabled{pointer-events:none;}
.lives{font-size:16px;letter-spacing:2px;}

/* match game */
.match-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;}
@media(min-width:480px){.match-grid{grid-template-columns:repeat(4,1fr);}}
.match-card{
  min-height:78px;border-radius:10px;border:1.5px solid var(--border);background:#fff;
  display:flex;align-items:center;justify-content:center;text-align:center;
  padding:6px;font-size:11.5px;font-weight:600;cursor:pointer;color:var(--primary-dark);
  transition:all .15s;
}
.match-card.hidden{background:linear-gradient(145deg,var(--primary-light),var(--primary));color:transparent;}
.match-card.hidden::after{content:"?";color:var(--gold-light);font-family:'Baloo 2';font-size:20px;}
.match-card.matched{background:#EAF7EF;border-color:var(--success);color:var(--success);cursor:default;}

.tip-box{
  background:#FFF8E8;border:1.5px solid var(--gold-light);border-radius:10px;
  padding:12px 14px;font-size:13.5px;color:#6B5416;margin-top:14px;line-height:1.5;
}
.tip-box b{color:#8A6D1B;}

.fail-item{
  border-bottom:1px solid var(--border);padding:10px 0;font-size:14px;
}
.fail-item:last-child{border-bottom:none;}
.fail-item .a{font-weight:700;color:var(--primary-dark);}
.fail-item .c{color:var(--ink-soft);}

table.lb{width:100%;border-collapse:collapse;font-size:14px;}
table.lb th{text-align:left;font-family:'Baloo 2';color:var(--ink-soft);font-size:12.5px;padding:6px 4px;border-bottom:2px solid var(--border);}
table.lb td{padding:9px 4px;border-bottom:1px solid var(--border);}
.rank-num{font-family:'JetBrains Mono';color:var(--gold);font-weight:700;}

.small-link{background:none;border:none;color:var(--primary-light);font-size:13px;cursor:pointer;text-decoration:underline;font-family:'Inter';padding:0;}
.center{text-align:center;}
.muted{color:var(--ink-soft);font-size:13.5px;}

/* ============ UTILS ============ */
function shuffle(arr){const a=arr.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));const t=a[i];a[i]=a[j];a[j]=t;}return a;}
function sample(arr,n){return shuffle(arr).slice(0,n);}
function slugify(s){return s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]+/g,'_').slice(0,60);}
function escapeHtml(s){return (s+'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function localGet(key){
  try{ return localStorage.getItem('nexpol_'+key); }
  catch(e){ return null; }
}
function localSet(key, value){
  try{ localStorage.setItem('nexpol_'+key, value); return true; }
  catch(e){ return false; }
}
async function storeGet(key, shared){
  return localGet(key);
}
async function storeSet(key, value, shared){
  return localSet(key, value);
}
async function getJSON(key, shared, fallback){
  const v = await storeGet(key, shared);
  if(v==null) return fallback;
  try{ return JSON.parse(v); }catch(e){ return fallback; }
}
async function setJSON(key, obj, shared){
  return storeSet(key, JSON.stringify(obj), shared);
}

function levelFor(score){
  if(score>=1000) return {name:'Oficial de Oposición', idx:4};
  if(score>=600) return {name:'Sargento', idx:3};
  if(score>=350) return {name:'Cabo', idx:2};
  if(score>=150) return {name:'Alumno NEXPOL', idx:1};
  return {name:'Aspirante', idx:0};
}

/* ============ QUESTION GENERATION ============ */
function buildQuestion(pool, groups){
  const useIntruder = groups.length>0 && Math.random()<0.22;
  if(useIntruder){
    const g = groups[Math.floor(Math.random()*groups.length)];
    const members = g.members;
    const three = sample(members, Math.min(3, members.length));
    const outsiderCandidates = pool.filter(function(e){ return members.indexOf(e.author)===-1; });
    if(outsiderCandidates.length>0){
      const outsider = outsiderCandidates[Math.floor(Math.random()*outsiderCandidates.length)];
      const options = shuffle(three.concat([outsider.author]));
      return {
        type:'intruder',
        text:'¿Cuál de estos autores <b>NO</b> trabajó '+g.label+'?',
        options:options, correct: outsider.author,
        tip: outsider.tip
      };
    }
  }
  const entry = pool[Math.floor(Math.random()*pool.length)];
  const dir = Math.random()<0.5 ? 'a2c' : 'c2a';
  const distractPool = pool.filter(function(e){ return e.concept!==entry.concept; });
  if(dir==='a2c'){
    const wrong = sample(distractPool,3).map(function(e){return e.concept;});
    const options = shuffle([entry.concept].concat(wrong));
    return {type:'standard', text:'¿Qué defendió/formuló <b>'+escapeHtml(entry.author)+'</b>?', options:options, correct:entry.concept, authorForStats:entry.author, tip:entry.tip};
  } else {
    const wrong = sample(distractPool,3).map(function(e){return e.author;});
    const options = shuffle([entry.author].concat(wrong));
    return {type:'standard', text:'¿Quién formuló: "'+escapeHtml(entry.concept)+'"?', options:options, correct:entry.author, authorForStats:entry.author, tip:entry.tip};
  }
}

/* ============ START GAME ============ */
function startGame(){
  const pool = activePool();
  const groups = activeGroups();
  if(state.mode==='parejas'){ startMatch(pool); return; }

  const length = state.mode==='contrarreloj' ? Math.min(20, pool.length) : Math.min(15, pool.length);
  state.queue = [];
  for(let i=0;i<length;i++) state.queue.push(buildQuestion(pool, groups));
  state.qIndex=0; state.score=0; state.streak=0; state.lives=3; state.correctCount=0; state.failed=[]; state.answered=false;
  state.screen='quiz';
  render();
  if(state.mode==='contrarreloj') startTimer();
}

/* ============ QUIZ RENDER ============ */
function renderQuiz(){
  const q = state.queue[state.qIndex];
  if(!q){ finishQuiz(); return '<div class="card"><p class="muted">Calculando resultados...</p></div>'; }
  const isTR = state.mode==='contrarreloj';
  let timerHtml='';
  if(isTR){
    const pct = Math.max(0, (state.timeLeft/state.timeTotal)*100);
    timerHtml = '<div class="timerbar-outer"><div class="timerbar-inner" id="timerbarinner" style="width:'+pct+'%"></div></div>';
  }
  let livesHtml = '';
  if(isTR){
    livesHtml = '<span class="lives">'+'❤️'.repeat(state.lives)+'🖤'.repeat(3-state.lives)+'</span>';
  }
  const optsHtml = q.options.map(function(opt){
    const safe = escapeHtml(opt).replace(/'/g,"&#39;");
    return '<button class="opt" data-val="'+safe+'" onclick="answerQuiz(this)">'+escapeHtml(opt)+'</button>';
  }).join('');
  return '<div class="card">'+
    '<div class="qmeta"><span>Pregunta '+(state.qIndex+1)+'/'+state.queue.length+'</span><span>Puntos: '+state.score+' '+livesHtml+'</span></div>'+
    timerHtml+
    '<div class="qtext">'+q.text+'</div>'+
    '<div class="options">'+optsHtml+'</div>'+
  '</div>';
}

function startTimer(){
  clearInterval(state.timerHandle);
  state.timeTotal = 9000; state.timeLeft = 9000;
  state.timerHandle = setInterval(function(){
    state.timeLeft -= 100;
    const bar = document.getElementById('timerbarinner');
    if(bar) bar.style.width = Math.max(0,(state.timeLeft/state.timeTotal)*100)+'%';
    if(state.timeLeft<=0){
      clearInterval(state.timerHandle);
      if(!state.answered) timeoutQuiz();
    }
  },100);
}

function timeoutQuiz(){
  state.answered=true;
  const q = state.queue[state.qIndex];
  state.failed.push(q);
  state.lives--;
  state.streak=0;
  markStat(q, false);
  revealAnswer(q, null);
  setTimeout(nextQuestion, 1100);
}

function answerQuiz(btn){
  if(state.answered) return;
  state.answered=true;
  clearInterval(state.timerHandle);
  const chosen = btn.getAttribute('data-val').replace(/&#39;/g,"'").replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>');
  const q = state.queue[state.qIndex];
  const correct = chosen===q.correct;
  if(correct){
    state.correctCount++;
    state.streak++;
    const pts = 10 + Math.min(state.streak*2, 20);
    state.score += pts;
  } else {
    state.failed.push(q);
    state.streak=0;
    if(state.mode==='contrarreloj') state.lives--;
  }
  markStat(q, correct);
  revealAnswer(q, chosen);
  setTimeout(nextQuestion, correct?700:1300);
}

function markStat(q, correct){
  const key = q.authorForStats || q.correct;
  if(!state.stats.byAuthor[key]) state.stats.byAuthor[key]={seen:0,correct:0};
  state.stats.byAuthor[key].seen++;
  if(correct) state.stats.byAuthor[key].correct++;
  state.stats.answered++;
  if(correct) state.stats.correct++;
}

function revealAnswer(q, chosen){
  const opts = document.querySelectorAll('.opt');
  opts.forEach(function(o){
    o.classList.add('disabled');
    const val = o.getAttribute('data-val').replace(/&#39;/g,"'").replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>');
    if(val===q.correct) o.classList.add('correct');
    else if(val===chosen) o.classList.add('wrong');
  });
  if(q.tip){
    const card = document.querySelector('#app .card');
    const div = document.createElement('div');
    div.className='tip-box';
    div.innerHTML = '💡 <b>Truco:</b> '+escapeHtml(q.tip);
    card.appendChild(div);
  }
}

function nextQuestion(){
  state.qIndex++;
  state.answered=false;
  if(state.mode==='contrarreloj' && state.lives<=0){ finishQuiz(); return; }
  if(state.qIndex>=state.queue.length){ finishQuiz(); return; }
  render();
  if(state.mode==='contrarreloj') startTimer();
}

async function finishQuiz(){
  clearInterval(state.timerHandle);
  state.stats.played++;
  await setJSON('stats', state.stats, false);
  await saveToLeaderboard();
  state.screen='results';
  render();
}

/* ============ MATCH GAME ============ */
function startMatch(pool){
  const counts = {};
  pool.forEach(function(e){counts[e.concept]=(counts[e.concept]||0)+1;});
  const uniquePool = pool.filter(function(e){return counts[e.concept]===1;});
  const n = Math.min(uniquePool.length>=8 ? 8 : 6, uniquePool.length);
  const chosen = sample(uniquePool, n);
  let cards=[];
  chosen.forEach(function(e){
    cards.push({key:e.id+'a', pairId:e.id, text:e.author});
    cards.push({key:e.id+'c', pairId:e.id, text:e.concept});
  });
  state.matchCards = shuffle(cards).map(function(c){ return Object.assign({}, c, {revealed:false, matched:false}); });
  state.matchFlipped=[]; state.matchMatchedCount=0; state.matchPairsTotal=n; state.matchAttempts=0;
  state.matchStart = Date.now();
  state.score=0;
  state.screen='match';
  render();
}

function renderMatch(){
  const cardsHtml = state.matchCards.map(function(c,i){
    let cls='match-card';
    if(c.matched) cls+=' matched';
    else if(!c.revealed) cls+=' hidden';
    return '<div class="'+cls+'" onclick="flipCard('+i+')">'+((c.matched||c.revealed)?escapeHtml(c.text):'')+'</div>';
  }).join('');
  return '<div class="card">'+
    '<div class="qmeta"><span>Parejas: '+state.matchMatchedCount+'/'+state.matchPairsTotal+'</span><span>Intentos: '+state.matchAttempts+'</span></div>'+
    '<p class="lead">Encuentra el autor y su concepto correspondiente.</p>'+
    '<div class="match-grid" id="matchgrid">'+cardsHtml+'</div>'+
  '</div>';
}

function flipCard(i){
  const c = state.matchCards[i];
  if(c.matched || c.revealed || state.matchFlipped.length>=2) return;
  c.revealed=true;
  state.matchFlipped.push(i);
  render();
  if(state.matchFlipped.length===2){
    state.matchAttempts++;
    const i1=state.matchFlipped[0], i2=state.matchFlipped[1];
    const c1 = state.matchCards[i1], c2 = state.matchCards[i2];
    if(c1.pairId===c2.pairId){
      c1.matched=true; c2.matched=true;
      state.matchMatchedCount++;
      state.score += 15;
      state.matchFlipped=[];
      render();
      if(state.matchMatchedCount>=state.matchPairsTotal) setTimeout(finishMatch, 500);
    } else {
      setTimeout(function(){
        c1.revealed=false; c2.revealed=false;
        state.matchFlipped=[];
        render();
      }, 850);
    }
  }
}

async function finishMatch(){
  const seconds = Math.round((Date.now()-state.matchStart)/1000);
  const bonus = Math.max(0, 60-seconds);
  state.score += bonus;
  state.failed=[];
  state.correctCount = state.matchPairsTotal;
  state.stats.played++;
  await setJSON('stats', state.stats, false);
  await saveToLeaderboard();
  state.matchSeconds = seconds;
  state.screen='results';
  render();
}

  return '<div class="card center">'+
    shieldHTML(lvl.idx)+
    '<h2 class="section-title" style="margin-top:12px;">¡Partida terminada!</h2>'+
    '<p class="lead">Puntuación: <b>'+state.score+'</b> · Rango: <b>'+lvl.name+'</b></p>'+
    timeInfo+
    '<div class="btn-row" style="justify-content:center;">'+
      retryBtn+
      '<button class="btn btn-ghost" onclick="switchScreen(\'menu\')">Volver al menú</button>'+
      '<button class="btn btn-gold" onclick="switchScreen(\'leaderboard\')">Ver ranking</button>'+
    '</div>'+
  '</div>'+
  (failedHtml ? ('<div class="card">'+failedHtml+'</div>') : '');
}

function retryFailed(){
  const failedQs = state.failed.slice();
  state.queue = failedQs;
  state.qIndex=0; state.score=0; state.streak=0; state.lives=3; state.correctCount=0; state.failed=[]; state.answered=false;
  if(state.mode==='parejas') state.mode='trivial';
  state.screen='quiz';
  render();
  if(state.mode==='contrarreloj') startTimer();
}

/* ============ LEADERBOARD (Firestore) ============ */
async function saveToLeaderboard(){
  try{
    const id = slugify(state.playerName) || ('anon_'+Date.now());
    const ref = db.collection('players').doc(id);
    const snap = await ref.get();
    const existing = snap.exists ? snap.data() : null;
    if(!existing || state.score > existing.bestScore){
      await ref.set({
        name: state.playerName,
        bestScore: state.score,
        mode: state.mode,
        updatedAt: Date.now()
      });
    }
  }catch(e){
    console.error('No se pudo guardar en el ranking', e);
  }
}

async function loadLeaderboardData(){
  const container = document.getElementById('lbTableWrap');
  try{
    const snap = await db.collection('players').orderBy('bestScore','desc').limit(20).get();
    let rows = '', i = 0;
    snap.forEach(function(doc){
      i++;
      const e = doc.data();
      rows += '<tr><td class="rank-num">#'+i+'</td><td>'+escapeHtml(e.name)+'</td><td>'+e.bestScore+'</td></tr>';
    });
    if(container){
      container.innerHTML = i>0 ? ('<table class="lb"><tr><th>#</th><th>Alumno</th><th>Puntos</th></tr>'+rows+'</table>') : '<p class="muted">Aún no hay puntuaciones. ¡Sé el primero!</p>';
    }
  }catch(e){
    console.error('No se pudo cargar el ranking', e);
    if(container) container.innerHTML = '<p class="muted">No se pudo cargar el ranking. Comprueba tu conexión a internet.</p>';
  }
}

function renderLeaderboardScreen(){
  return '<div class="card">'+
    '<h2 class="section-title">🏆 Ranking de la academia</h2>'+
    '<p class="lead">Mejores puntuaciones de todos los alumnos que han jugado.</p>'+
    '<div id="lbTableWrap"><p class="muted">Cargando...</p></div>'+
    '<div style="height:14px"></div>'+
    '<button class="btn btn-ghost" onclick="switchScreen(\'menu\')">Volver al menú</button>'+
  '</div>';
}

/* ============ PROGRESS ============ */
function renderProgress(){
  const authors = Object.keys(state.stats.byAuthor);
  const rows = authors
    .map(function(a){ return Object.assign({a:a}, state.stats.byAuthor[a]); })
    .sort(function(x,y){ return (x.correct/x.seen) - (y.correct/y.seen); })
    .slice(0,15)
    .map(function(r){ return '<div class="fail-item"><span class="a">'+escapeHtml(r.a)+'</span> <span class="c">— '+r.correct+'/'+r.seen+' aciertos</span></div>'; })
    .join('');
  const pct = state.stats.answered ? Math.round(100*state.stats.correct/state.stats.answered) : 0;
  return '<div class="card">'+
    '<h2 class="section-title">Mi progreso</h2>'+
    '<p class="lead">Partidas jugadas: <b>'+state.stats.played+'</b> · Precisión global: <b>'+pct+'%</b></p>'+
    '<div class="progress-bar-outer"><div class="progress-bar-inner" style="width:'+pct+'%"></div></div>'+
  '</div>'+
  '<div class="card">'+
    '<h2 class="section-title">Autores a reforzar</h2>'+
    '<p class="lead">Los que más se te resisten, según tu historial.</p>'+
    (rows || '<p class="muted">Todavía no hay suficientes datos. ¡Juega una partida!</p>')+
    '<div style="height:10px"></div>'+
    '<button class="btn btn-ghost" onclick="switchScreen(\'menu\')">Volver al menú</button>'+
  '</div>';
}

init();
</script>
</body>
</html>
